services:
  document:
    image: ghcr.io/kyundae-kim/docmesh-doc:v0.1.2
    env_file:
      - .release/.env
    restart: unless-stopped
    depends_on:
      - document-db
    networks:
      - net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=docmesh-infra_net"
      - "traefik.http.routers.document.rule=PathPrefix(`/documents`)"
      - "traefik.http.routers.document.entrypoints=web"
      - "traefik.http.services.document.loadbalancer.server.port=8000"
    ports:
      - 8000

  document-db:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: 'admin'
      MINIO_ROOT_PASSWORD: 'password123'
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - net

networks:
  net:
    external: true
    name: docmesh-infra_net
 