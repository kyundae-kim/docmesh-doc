[project]
name = "docmesh-doc"
version = "0.1.1"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi-core",
    "hermes-agent>=0.14.0",
]

[tool.uv.sources]
fastapi-core = { git = "https://github.com/kyundae-kim/fastapi-core.git" }

[tool.ruff]
line-length = 88
indent-width = 4

[tool.pytest.ini_options]
testpaths = ["test_docmesh_doc"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
