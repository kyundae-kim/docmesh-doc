[project]
name = "docmesh-doc"
version = "0.1.1"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi[standard]>=0.135.3",
    "fastapi-core",
    "httpx>=0.28.1",
    "minio>=7.2.18",
    "pyjwt[crypto]>=2.12.1",
    "pytest>=9.0.3",
    "alembic>=1.18.4",
    "nats-py>=2.9.0",
]

[tool.fastapi]
entrypoint = "main:app"

[tool.uv.sources]
fastapi-core = { git = "https://github.com/kyundae-kim/fastapi-core.git" }

[tool.ruff]
line-length = 88
indent-width = 4

[tool.pytest.ini_options]
testpaths = ["test_docmesh_doc"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
anyio_mode = "auto"
