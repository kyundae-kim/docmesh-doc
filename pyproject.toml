[project]
name = "fastapi-template"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi[standard]>=0.135.3",
    "pyjwt[crypto]>=2.12.1",
    "pytest>=9.0.3",
]

[tool.fastapi]
entrypoint = "fastapi_template.main:app"

[tool.ruff]
line-length = 88
indent-width = 4

[tool.pytest.ini_options]
testpaths = ["test_fastapi_template"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
